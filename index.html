<!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  const car = document.querySelector('#truck');

  car.addEventListener('animationcomplete__first', () => {
    car.emit('moveDone');
  });
});
</script>
    
  </head>
    <body>
    <a-scene>
      <a-sky color="lightblue"></a-sky>
      
       <!-- Put this inside the <a-scene> -->
      <a-entity 
      ply-model="src:City model-0.ply"
      position="-4.8 0.8 -5"
      rotation="-90 90 90"
      ></a-entity>

      <a-entity 
      ply-model="src:City model-1.ply"
      position="-4.8 0.8 -5"
      rotation="-90 90 90"
      ></a-entity>

      <a-entity 
      ply-model="src:City model-2.ply"
      position="-4.8 0.8 -5"
      rotation="-90 90 90"
      ></a-entity>

      <a-entity 
      ply-model="src:City model-3.ply"
      position="-4.8 0.8 -5"
      rotation="-90 90 90"
      ></a-entity>

<a-entity id="truck"
  ply-model="src:truck.ply"
  position="3.295 1.384 -1.236"
  rotation="-90 270 90"
  scale="0.27 0.27 0.27"

  animation__first="
    property: position;
    to: 3.295 1.384 -10.101;
    dur: 30000;
    easing: linear;
    startEvents: loaded
  "

  animation__turn="
    property: rotation;
    to: -90 180 90;
    dur: 800;
    easing: linear;
    startEvents: moveDone
  "
></a-entity>
                 
    </a-scene>
  </body>
</html>
